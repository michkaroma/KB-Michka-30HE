units:
  u: 19
  kx: 18
  ky: 18

points:
  zones:
    matrix:
      anchor:
        shift: [150, -150]
      key:
        width: kx
        height: ky
        spread: u
        padding: u
      columns:
        col0:
          rows:
            r1:
              shift: [-3-1/6,0]
            r2:
              width: 24+1/3
              shift: [-3-1/6, 0]
            r3:
              width: 30+2/3
              shift: [-3-1/6, 0]
            r4:
              width: 37
              shift: [-9, 0]
        col1:
        col2:
        col3:
        col4:
        col5:
        col6:
          rows:
            r2:
              skip: true
            r3:
              skip: true
            r4:
              skip: true
      rows:
        r4:
          shift: [1/2,0]
        r3:
          shift: [-6-1/3,0]
        r2:
          shift: [-6-1/3,0]
        r1:
          shift: [-6-1/3,0]
    thumb:
      anchor:
        ref: matrix_col1_r4
        shift: [-36.5,-19]
      key:
        width: kx + 3
        height: ky
        spread: u +3
      columns:
        col0:
        col1:
        col2:
        col3:
          key:
            width: (kx+5)*2 +1
            spread : kx*2 -1
        col4:
          key:
            width: kx
            spread: (kx)*2 -2.5
      rows.r5:
outlines:
  keys_normal:
    - what: rectangle
      where: /matrix_col[1-5]/
      size: [kx-0.5, ky-0.5]

  keys_col0_r1:
    - what: rectangle
      where: /matrix_col0_r1/
      size: [kx-0.5, ky-0.5]

  keys_col6_r1:
    - what: rectangle
      where: /matrix_col6_r1/
      size: [kx-0.5, ky-0.5]

  keys_col0_r2:
    - what: rectangle
      where: /matrix_col0_r2/
      size: [23.83, ky-0.5]  # 24+1/3 - 0.5

  keys_col0_r3:
    - what: rectangle
      where: /matrix_col0_r3/
      size: [30.17, ky-0.5]  # 30+2/3 - 0.5

  keys_col0_r4:
    - what: rectangle
      where: /matrix_col0_r4/
      size: [36.5, ky-0.5]  # 37 - 0.5

  keys_thumb_normal:
    - what: rectangle
      where: /thumb_col[0-2]/
      size: [kx+2.5, ky-0.5]

  keys_thumb_col4:
    - what: rectangle
      where: /thumb_col4/
      size: [kx-0.5, ky-0.5]

  keys_thumb_spacebar:
    - what: rectangle
      where: /thumb_col3/
      size: [(kx+5)*2+0.5, ky-0.5]  # (kx+5)*2+1 - 0.5

  keys_outline:
    - what: outline
      name: keys_normal
    - what: outline
      name: keys_col0_r1
    - what: outline
      name: keys_col6_r1
    - what: outline
      name: keys_col0_r2
    - what: outline
      name: keys_col0_r3
    - what: outline
      name: keys_col0_r4
    - what: outline
      name: keys_thumb_normal
    - what: outline
      name: keys_thumb_col4
    - what: outline
      name: keys_thumb_spacebar

  board:
    - what: polygon
      operation: stack
      points:
        - ref: matrix_col0_r1
          shift: [-10.5,10.5]  
        - ref: matrix_col6_r1
          shift: [19,10.5]  
        - ref: thumb_col4_r5
          shift: [19,-10.5]  
        - ref: thumb_col0_r5
          shift: [-12,-10.5]
      fillet: 2
  combo:
    - name: board
    - operation: subtract
      name: keys_outline
pcbs:
  first:
    outlines:
      main.outline: board
    footprints:
      he_switch:
        what: HESwitch_Michka
        where: true
        params:
          GND: "GND"
          VCC: "VCC"
          signal: '{{colrow}}'
          intern: 'Q_{{colrow}}'
      screw1:
        what: mountinghole
        where:
          - ref: matrix_col0_r1
            shift: [14, -11]
      screw2:
        what: mountinghole
        where:
          - ref: matrix_col5_r1
            shift: [9.5, -9]
      screw3:
        what: mountinghole
        where:
          - ref: matrix_col5_r4
            shift: [-10, -11]
      screw4:
        what: mountinghole
        where:
          - ref: matrix_col0_r4
            shift: [14, 0]
      screw5:
        what: mountinghole
        where:
          - ref: matrix_col3_r2
            shift: [-3, -10]
      mux:
        what: ADG732
        where:
          aggregate:
            parts:
              - ref: matrix_col5_r3
                shift: [14.5, 0]
                #rotate: 180
        params:
          S1: "col5_r2"
          S2: "col4_r2"
          S3: "col3_r2"
          S4: "col2_r2"
          S5: "col1_r2"
          S6: "col0_r2"
          S7: "col0_r3"
          S8: "col1_r3"
          S9: "col2_r3"
          S10: "col3_r3"
          S11: "col4_r3"
          S12: "col5_r3"
          S13: "col0_r4"
          S14: "col1_r4"
          S15: "col2_r4"
          S16: "col3_r4"
          S17: "col0_r1"
          S18: "col1_r1"
          S19: "col2_r1"
          S20: "col3_r1"
          S21: "col4_r1"
          S22: "col5_r1"
          S23: "col6_r1"
          S24: ""
          S25: ""
          S26: "col4_r5"
          S27: "col3_r5"
          S28: "col2_r5"
          S29: "col1_r5"
          S30: "col0_r5"
          S31: "col5_r4"
          S32: "col4_r4"
          A0: "MUX_A0"
          A1: "MUX_A1"
          A2: "MUX_A2"
          A3: "MUX_A3"
          A4: "MUX_A4"
          CS: "GND"
          WR: "GND"
          EN: "GND"
          D: "AIN1"
          VDD: "VCC"
          VSS: "GND"
          GND: "GND"
          NIC: ""
      mcu:
        what: RP2040_Zero
        where:
          aggregate:
            parts:
              - ref: matrix_col5_r2
                shift: [22, 2.5]
          rotate: -90
        params:
          GP0: "MUX_A4"
          GP1: "MUX_A3"
          GP2: "MUX_A2"
          GP3: "MUX_A1"
          GP4: "MUX_A0"
          GP5: ""
          GP6: ""
          GP7: ""
          GP8: ""
          GP9: ""
          GP10: ""
          GP11: ""
          GP12: ""
          GP13: ""
          GP14: ""
          GP15: ""
          GP26: ""
          GP27: "AIN1"
          GP28: ""
          GP29: ""
          V3v3: "VCC"
          GND: "GND"
          V5: ""